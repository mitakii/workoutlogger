services:
  traefik:
    image: traefik:v3.1

    container_name: traefik

    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.cloudflare.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge=true"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"

    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt

    restart: unless-stopped

  api:
    build:
      context: ./backend/api

    container_name: workout-log-api

    environment:
      ASPNETCORE_ENVIRONMENT: Production

      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_STRING}

      JWTOptions__Issuer: ${JWT_ISSUER}
      JWTOptions__Audience: ${JWT_AUDIENCE}
      JWTOptions__SigningKey: ${JWT_SIGNING_KEY}

      CloudinarySettings__CloudName: ${CLOUDINARY_CLOUD_NAME}
      CloudinarySettings__ApiKey: ${CLOUDINARY_API_KEY}
      CloudinarySettings__ApiSecret: ${CLOUDINARY_API_SECRET}

    expose:
      - "8080"

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.mitakiilab.com`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=cloudflare"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: workout-log-frontend

    depends_on:
      - api

    expose:
      - "80"

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`app.mitakiilab.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=cloudflare"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

    restart: unless-stopped
